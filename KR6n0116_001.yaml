body:
  text: 陳那菩薩造論唐三藏法師玄奘譯護法菩薩造釋唐三藏法師義淨譯明蜀沙門明昱録記觀所緣緣論釋者乃觀察所緣之境必具發識之緣而論之論不足以盡其詳復益之以釋釋者解釋義論者分辨義緣者親友義所緣者有境義觀者察義以智照境義謂凡小不達唯心之旨妄執心外別有實境即是極微或極微所成名為和合各別執為所緣緣義故論主造論令彼觀察根境唯心不墮邪見稠林耳唯識論云所緣緣者謂若有法是帶己相心或相應釋云謂若有法者必是有體本質法名緣是帶己相者即相分名所緣相質合說名所緣緣帶字屬心己屬本質相即相分謂能緣心緣所緣境時帶起本質家己之相分故帶有二義一變帶即八箇識有疏所緣緣本質是為託此有體境為本質變似質之相起名為變帶二挾帶即一切親所緣緣實相分是為此相分不離能緣之心其能緣心親挾此相分而緣名為挾帶己相亦有二義一相狀相即變帶似質之己相以相分似本質己體故名疏所緣緣也二體相相即挾帶所緣相分之己相以相分不離能緣之體故名親所緣緣也心或相應者此辨所緣緣之果也以所緣為緣是因生得心心所是果心即八識心王相應即五十一心所有起不起故復言或已上解觀所緣緣四字竟第五論字唯識開蒙云教誡學徒決擇性相激揚宗極藻義攸歸垂範後昆名之為論第六釋字釋者解也疏通解釋捨疑成解散濁留清廢詮服義名之為釋第七記字有三義謂記憶記別記録此名記者録集成編以備遺忘故非記別但取記憶記録為記耳釋題竟下文科分第一序分若言能令毒智人為令其慧極明了及為消除於罪惡稽首敬已觀其義法不孤起仗境方生為衆生被毒智所蒙不達境空心有之旨則菩薩大悲始運令彼觀心自悟耳所言毒智人者慧不明了人也以慧不明取心外境戕害法身傷殘慧命故名毒智於三毒中癡毒乃全貪毒一分以取外境屬貪分故何非瞋分曰既與貪俱於境愛染不憎彼故故無有瞋何害法身及傷慧命曰彼執外色為生識之緣又執為所緣之境心境妄計煩惱從生生煩惱故覆真實義障聖慧眼豈非法身慧命乎故知無明毒智為害不淺欲令斯輩智慧極明而消除罪惡者必以唯識正理觀察故稽首三尊而觀其義一序分竟下二正宗分於本論文唯約七科餘科俱依釋論分頭凡題論曰二字皆本論文題釋曰及不題釋曰者俱釋論文今正宗一分初分為二一破彼執二明自宗一又分二一總標二別破一又分二一總論二別推一又分三一論能緣內識二論所緣外境三結彼執相違一又分二一牒本論略釋論曰諸有欲令眼等五識以外色作所緣緣者或執極微許有實體能生識故或執和合以識生時帶彼相故釋曰諸許眼等識者於所棄事及所收事或捨或取是觀察果故所捨事體及顛倒因是所顯示諸許眼等識者即本論中諸有欲令眼等五識一句今護法師牒而釋之謂諸餘乘執眼等五識以外色作所緣緣外色者即彼所計極微和合二種極微無體觀色析成將一須彌析為七分內取一分又為七分展轉析至極微故護法師以極微為所棄事須彌既可析為極微極微亦可合為須彌故護法師以和合為所收事或捨或取者謂他宗或取極微而捨和合或取和合而捨極微取執事成是彼觀察之智果所捨事體是他宗不取之事及顛倒因是他宗執取之事以此而為顯示顛倒因者責彼非因計為因故一牒本論略釋竟下二論能緣差別分三一論等字所攝此中等言謂攝他許依其色根五種之識由他於彼一向執為緣實事故意識不然非一向故許世俗有緣車等故縱許意識緣實事境有其片分亦能將識相似之相離無其境於眼等識境不相離得成就已方為成立是故於此不致殷勤此推他宗執根識不同意識所緣此中等言是本論中眼等識之等字護法師釋云此中等言謂攝他許依其色根五種之識何則由他於彼一向執為緣實事故此句乃護法師斥他宗一向執眼等五識緣極微和合為真實之事意識不然非一向故者此謂意識不同五識意非一向緣其實事許世俗有緣車等故者釋成眼等五識一向緣實事境自許車等是世俗有以車等為實事故問曰意識有時亦能緣實事境何言意識不然答曰縱許意識緣實事境有其片分亦能將識相似之相離無其境此謂意識緣境一剎那頃即離境而緣相似之相即意識於境上變起似質之影相離無其境者即是離其實境而獨緣影於眼等識境不相離者謂眼等識緣境不離則所緣之境皆是實有故知意識不然非一向故得成就已至不致殷勤者他宗自謂確然應理方可立宗理既彰明殷勤於意識亦何益焉又復於慣修果智所了色誠非咀迦所行境故及如所見而安立故今此但觀聞思生得智之境也如斯意識所緣之境全成非有此於自聚不能緣故復緣過未非實事故猶若無為為此等言攝五識身他宗重訂意識不能緣五識之境但緣過未不實之事言果智所了色者即假想觀中極微色也咀迦者指意識言此色正為意識所緣他宗反謂誠非意識所行境故及如所見安立者是意識緣本質色安立名言即彼妄執假想觀中分析極微正是意識安立名言外宗亦謂非意識所行此皆昧於色心不二之旨妄執心外有色為實事境今此但觀聞思生得智之境者智即第六意識境即聞思之境謂此意識從聞所說境上生即觀此境為所緣意謂但觀聞思境生得意識智又言但觀者為顯意識唯緣此境故如斯意識所緣之境全成非有者是推意識於上假想名言俱不能緣此於自聚不能緣故者自乃極微聚名和合此又謂意識不能緣極微和合為境復緣過未非實事故猶若無為者是許意識緣假不能緣實故下結云為此等言攝五識身一論等字所攝竟下二論意識別緣若爾根識引生所有意識斯乃如何此非共其根識同時或復無間皆滅色等為所緣故或緣現在此非根識曾所領故斯乃意識自能親緣外境體性此則遂成無聾盲等復違比量知有別根此遮增色是所欲故然於意識不復存懷此破他宗不許意識與五識同時緣五塵為境故護法師問曰若爾根識引生所有意識斯乃如何若爾之言指上章中意謂汝若不許意識與根識同時緣境即今現見引生根識緣境意識方知長短方圓斯乃如何不許故難云此非共其根識同時復難云設許意識非共根識緣境或復無間皆滅色等為所緣故言無間者謂意識必與五識無間而生汝不許與五識同緣則意識必滅五塵而後緣再難云若過未之事則可或緣現在境此非根識曾所領故既不用根識所領而意識能緣者斯乃意識自能親緣外境體性若意識親緣外境而不同五識緣者此則遂成無聾盲等聾盲之言謂耳不識聲等曰聾眼不知青等曰盲使其聾盲者在意識亦不離根識何則謂五識依浮塵根時即對色等五塵已有意識同時則能分別色之青黃聲之高下若浮塵根壞時縱有意識於聲不能知清濁於色不能知長短是故謂之聾盲汝既許意識自能親緣外境體性必不用五根根若壞時自有意識能緣聲色又何聾盲之有耶若如是者不但無聾盲復違比量何得違耶釋云知有別根此遮增色是所欲故是故相違知有別根者謂意識知五塵時別有能生之根故不同於五根緣五塵境既不同緣五塵為境則增色自何而生增色者謂五塵各有自相本質五識緣時取境清明唯是現量得境自相意識緣時則從本質色上起長短方圓之相對自相說名為增色既不與五同緣自相尚無何有增色言比量者如見其地比知是堅見其水比知有濕見其火比知是暖見其風比知有動此比量之理必託增色推明增色既遮比量之理必違矣又則比量為意識之必然安得以意識無比量耶然於意識不復存懷者此句結前意在起後二論意識別緣竟下三論內外意許眼等諸識色為依緣而方有故無表但是不作性故自許是無本意如此此論外宗許與不許之意外宗許極微之體自然性是不作而有堅常之德眼等諸識必以極微色為所依緣諸識方生不許無表色者謂無表但是不作性而無堅常之德不能生識故護法師釋云自許是無本意如此以無表色實不能生識故此於所緣將為現量是所取性故深履邪途故為此正意遮所緣性因便方遮斯所依性同時之根功能之色將設許之此護法師斥他宗之非復推論主所立比量及言陳之意極微為所緣將為現量者是彼執取一偏之性而深履邪途也論中立量正意但遮所緣則所依之性亦遮矣何則所緣緣者唯是一法要能生識必作所緣彼所緣之性既遮所依之性何有同時之根功能之色將設許之者色及功能是生緣義立量之初必以言陳縱許耳三論內外意許竟通上一論能緣內識竟下二論所緣外境言外境者彼執離斯而有別境此顯其倒顯彼執有異事可取故言境也如何當說或言總聚由非總聚實事應理言外境者此護法師牒論中一句之義釋之論中言以外色作所緣緣者色即境也故釋云彼執離斯而有別境謂離識外別有色境為生識因此自顯顛倒復釋云顯彼執有異事可取故言境也上云外境未曾的指何事為境故問云如何為境而當說之答曰或云總聚然諸餘乘有計和合為所緣緣若是破其和合之非即轉計極微真實之事故云由非總聚實事應理觀夫極微和合乃本質色邊假想光景耳安得為五識現量境耶如斯妄計非倒而何二論所緣外境竟下三結外執相違誠如來難彼自前後道理相違余復何失總結前意謂誠然如上來所難之義是知外計之情既僻前後道理相違唯識之旨自明縱奪抑揚何愧三結彼執相違竟通上一總論竟下二別推分四一推論主縱許緣其實事及緣總聚是所許故將欲敘其別過為此且放斯愆此牒論中二執之意實事即極微總聚即和合此二是外宗自所執取故論主以言陳縱許設有問曰何不直以心外有法為破而又以比量共許答曰將欲等謂論主將以比量顯其別過故此不論心外有法之愆一推論主縱許竟下二推彼執極微或許極微雖復極微唯共聚已而見生滅然而實體一一皆緣不緣總聚猶如色等設自諸根悉皆現前境不雜亂彼根功能各決定故而於實事斷割有能一一極微成所緣境彼因性故彼眼等識之因性故是彼生起親友分義然而有說其所緣境是識生因在諸緣故述成他宗計極微為所緣緣意或許極微一句即本論云或執極微許有實體能生識故下推他意云雖復極微唯共聚已而見生滅者彼謂極微本不生滅其生滅者在共聚而有也然而實體一一皆緣不緣總聚者是計極微為所緣不用和合為所緣又以喻明猶如色等指五塵也設自諸根現前境不亂者指五根對五塵而不雜亂故云彼根功能各決定故是謂見不超色聽不出聲上明喻體下乃合法而於實事斷割有能者謂極微真實之事能為眼等諸識作所緣境斷割者是五塵各別之狀故云一一極微成所緣境既作所緣復計生識故云彼因性故彼眼等識之因性故是彼生起親友分義親友者助緣之義謂極微能為生識因緣故云爾也復引證云然而有說其所緣境是識生因在諸緣故此引大乘所緣緣義而證極微為所緣緣之理二推外執極微竟下三推彼執和合或復於彼為總聚者彼諸論者執衆極微所有合聚為此所緣相識生故由於總聚而生其智是故定知彼為所緣如有說云若識有彼相彼是此之境述成他宗以和合為所緣緣意或復於彼為總聚者即本論云或執和合以識生時帶彼相故推彼意云彼諸論者執衆極微所有合聚為此所緣相識生故此句計所緣之境為生識之因謂和合為境又能生識相識生故者是相似和合相狀之識而得生起由於總聚而生其智者智即識也智本不生由緣境而生故云是故定知彼為所緣復引證云如有說云若識有彼相彼是此之境此亦引大乘所緣緣義以證和合為所緣緣之理三推彼執和合竟下四結彼許相應此二論者咸言彼相應斯理故總結二計自許相應四結彼許相應竟通上一總標竟下二別破分二一牒標中二執別破二舉二種轉計別破一又分四一總推立量論曰二俱非理所以者何極微於五識設緣非所緣彼相識無故猶如眼根等所緣緣者謂能緣識帶彼相起及有實體令能緣識託彼而生色等極微設有實體能生五識容有緣義然非所緣如眼根等於眼等識無彼相故如是極微於眼等識無所緣義釋曰若不言因此因無喻猶如因等成因等性極微總相是所緣性而成立之又若自許不於識外緣其實事應有有法自相違過此護法師推論主立量之意若不言因此因無喻者因即比量有宗因喻三支三支無過是為能立今以三支為因者為因明中云比量者謂藉衆相而觀於義相有三種即三支也如前已說由彼為因於所比義有正智生即智名果故以此因總三支為因非三支中宗因喻之一因也若欲破彼不極成事而不立量為因者則無有喻故云此因無喻此三支中喻也何以獨言喻耶謂喻者是比量中立破之洪綱驅邪之明訓故論云同品無處不成立者之宗異品有處反成敵者相違宗義此中若無有喻而欲成之猶如因等成因等性此宗因之因也何則因明之法立宗之後必以因成故以因為能成立法宗因既立當引喻合故以喻為同品三支並出有過必知今欲破彼和合極微而不立量者是謂極微成極微和合成和合猶如因成因喻成喻又何過失之顯也彼過未顯自失先招故云極微總相是所緣性而成立之又若自許不於識外緣其實事應有有法自相違過有法者是先陳極成色法為宗依謂之有法故因明以有法為前陳自相違者謂自教不許緣識外事若以外色作所緣者是與自教相違所以奘師立量云真故極成色是有法定不離眼識宗眼識者意許自證分同喻如眼識此即眼識見分彼立極成色是相分色相分原從自證分現既云識現豈得離識如水現波波豈離於水也又同喻如眼識者眼識亦是自證分現亦不相離眼識不離自證分相分亦不離自證分是眼識不離相分相分與眼識為所緣緣若是極微和合為有法於五識作所緣緣為宗極微和合是心外法法在心外安得與五識為緣而不相違耶此乃論主將立量時以比量之法自謹耳然法稱不許斯乃於他亦皆共許即以為喻若但如所說應於所立義而屬當之此總釋二比量中宗也法稱不許者大乘宗法不許外色為五識所緣緣斯乃於他亦皆共許者即論中立量云極微於五識設緣非所緣和合於五識設所緣非緣頌言設緣及設所緣者是共許宗義即以為喻者謂既立比量之後即將外色為異品喻異品者非有同品之義名為異品且如極微雖許有生識緣而無所緣境既無所緣境生識之緣亦無矣又如和合雖許所緣而不能生識若不生識亦非所緣彼之外色既不生識又無所緣豈非異喻耶若但如所說應於所立義而屬當之者謂如言陳所說得立量之後應於意許所立義而屬當之屬者會也應會意許相分為當前量意云論本二因但是明因所以不即是因以無共成之喻為此須出彼相應因此推論中所立二比量前量意云論本二因者即極微和合二量為二因非三支中宗因之因何則外宗以極微和合為因觀察生智為果故以二法為二因但是明因者但以極微和合喻明真因即內色如外現之義所以不即是因者護法師不許為真因何則以無共成之喻共成者須一法有二功能要是能生又是所緣方為真因為此須出彼相應因者出者顯也彼字指他宗相應者他宗以極微為相應因為此明他共許故須顯出彼之極微為生識因一總推立量竟下二別破極微分二一縱許生因何以如此問上共許極微為因之意次復顯己所論之理是無謬妄明他共許置第五聲設許為因猶如共許諸非有事非有性故非因極微而且縱許諸極微體是其因性但說不合是所緣性此護法師詳明比量中縱許之意以答上問言顯己所論之理是無謬者謂顯唯識之理極成耳明他共許置第五聲者因明法中若他不許量則不成是故內有縱詞外亦共許第五聲者是因明中第五分即異品也此論先縱後奪故置第五聲設許為因者釋上縱許為因之意故又喻云猶如共許諸非有事非有者亦是異品因明以同品為有以異品為非有非有同品義名曰非有故下釋云非有性故非因極微而且縱許諸極微體是其因性但說不合是所緣性由非彼相極微相故此云根識極塵非境此釋因也由非彼相者是本論比量中彼相識無故之因所以釋云極微相故又從而釋之此云根識極塵非境是不許極微為五識所緣如根者言猶如於根縱實是識親依之因無根相故非彼之境極微亦爾此釋喻也如根者言是本論比量中猶如眼根等之喻護法師牒而釋之猶如於根是以極微如眼根眼根縱實是眼識親依之因而眼識不能見眼根相故非彼境合云極微亦爾極微縱許為生識之緣而眼識不能見極微之狀故非所緣諸無其相彼非斯境者何謂也問上極微非境之由何所謂也為此說其名境者等言自性者謂自共相了者定也如何此復名為了耶如彼相生故此言意者同彼相貌而識生起由隨彼體故此則說名了彼境也而實離識無別所了可與其識為因性耶先答所緣緣正理復顯極微之非為此說其名境者等等字亦攝緣字謂所緣之境即是能生之緣故釋云言自性者謂自共相了者定也意謂境之自相必有二種功能是為共相如何此復名為了耶問上了境意答云如彼相生故此句牒本論中所緣緣正義論云謂能緣識帶彼相起及有實體令能緣識託彼而生護法師釋云此言意者同彼相貌而識生起是境有生識之功能名緣由隨彼體故者識隨境生而不離境名所緣此則說名了彼境者答上問意論正意已復破云而實離識無別所了可與其識為因性耶此將雙破所緣緣之張本謂極微既與識相離離識則不能了此破所緣之境極微離識則不相及安得以識緣彼而得生耶是破生識之緣前云為此正意遮所緣性因便方遮斯所依性文雖未出意現於此然而但有前境相狀於其自己猶如鏡像而安布之共許名斯為了其境然非極微一一自體識隨彼狀由此極微而為境體此護法師設喻難了境義文有兩節然而下先縱然非下破然而但有前境相狀者謂汝計極微但得一相可狀於前於其自己猶如鏡像而安布之鏡像者極微如鏡所生之識如鏡中現像若如是者我則共許名斯為了其境既縱已復破云然非極微一一自體識隨彼狀由此極微而為境體意謂極微之體不能顯現安得以極微為境體使識隨彼體而現耶縱有因性由非因義所緣如根雖是因性不為所緣即本論云色等極微設有實體能生五識容有緣義然非所緣此因性雖破猶兼縱許所緣之境必不許者意在雙支全破耳若由因性許作所緣根亦同斯應成彼也斯言前說彼相應理故因有不成過然而意顯非唯因性即是其根所緣之相若如所說因將為能立者則彼因性故為所緣性耶於根亦有成不定過即本論云如眼根等於眼等識無彼相故如是極微於眼等識無所緣義此護法師乘他宗之計而以同喻難之他宗轉計云汝大乘中言所緣緣者此是能生定作所緣汝既許極微為能生因安得不為所緣論主云若有因性許作所緣根亦同斯應成彼也自釋云斯言前說彼相應理故因有不成過意謂前所轉計為相應斯理如取同品之根難之則因性必有不成所緣之過復自釋云然而意顯極微之體非唯因性亦可得作所緣之相縱也即是其根亦有所緣相難也若如所說因將為能立者則彼因性故為所緣性耶於根亦有成不定過破也意謂若如汝說許作因性必有所緣而成立者汝之極微但為因性安得有所緣性耶若由因性必有所緣性者於根亦有不定過何則眼根於眼識決定不見若許眼根作所緣者眼根則有非定不見之過矣一縱許生因竟下二雙支全破若如是者由非彼相其義何也問極微之相原論量中有設許為緣今觀釋論中縱有因性由非因義其義何也為明成立自己之宗由非但述他宗過故己義便成此言為彰非即能生自識相故境非極微猶如眼等若其是彼因性之言將為論主前立他宗明他共許此時意在遮他顯己能破義成置斯言矣為明成立自己之宗由非者此句總答上問意下釋非他之所以但述他宗不成之過自己所立之義便為極成此由非之言為彰明極微非即能生自識相故此非其緣也境非極微猶如眼等非所緣也問曰此中雙非兩相前量何許次支答曰若其是彼因性之言將為論主前立他宗明他共許其時意在遮他顯己能破義成置斯言矣斯言即意許雙支全破之言宗許定彼不定他宗恐其不許此釋論主明他共許之意謂宗中原許有定於彼論主不縱許而定之恐其他宗不許耳向者與他出不定成即是能破何假自宗更申比量此問論主所立比量謂向者論中言二俱非理己出不定過成即是能破何假自宗中更申比量耶凡言不定未必決定不成恐致疑惑是故更須立量或可由斯非彼相者於諸極微非定了性如相識生是謂決了既彼非故明知決了此亦無由應可說非決了性故唯出此因不是所緣此答上問意謂凡言陳不定未必決定不成若不決定必致疑惑是故論主更須成立比量決之或可由斯所立比量非彼極微相者令彼於諸極微知非定有所了境性如相識生是謂決了者謂以極微為決定所了之境方說極微生識所以前章云同彼相貌而識生起由隨彼體故此則說名了彼境也既彼非故明知決了者謂彼極微既不能生識明知決了義不在極微之色故不能為所緣境此亦無由應可說非決了性故者謂若不重申比量則無有因由破彼極微非決了性唯出此因不是所緣者謂立量之法必有共許量乃得成故此量中唯許為因而不許是所緣是言陳共許為生因如根極微有餘復作諸識差別顯其成立眼識不能了極微色無彼相故如餘根識如是餘識翻此應言如根之言誠為乘也其喻別須義准而出又復縱是因性之言為無用矣彼雖因用非所緣性此亦如是實為有用然非聲等所有極微可是餘根之識生因此引唯識宗中別喻并破極微之非此文破法兩重先破所緣後破因性本論量中如根之喻雖破所緣境不破生識因今引餘師諸識之喻則因境雙破何則極微之色唯攝眼門餘根識喻不同初界界既不同何生因之有先破所緣云如根極微有餘復作諸識差別此牒眼根之喻并破不能為所緣義釋云顯其成立眼識不能了極微色無彼相故如餘根識意謂餘根之識或緣聲香味觸安得以色相極微為所緣境問曰眼識之門唯緣色相極微既以色相為名又何眼識不緣耶答曰色相之門原有多種謂有質無質極略極逈今極微色是極略色若是極略便為意識所緣故於眼識門中以如根之喻為破如是餘識翻此者謂餘識不同眼識眼識容有緣色之說而餘識必不能緣色相境應言如根之言誠為乘也者謂如眼根眼識不見乘此應知餘識不能緣色相者又明矣結云其喻雖有根識兩別於所喻之義理准同而出次破因性云又復縱是因性之言為無用矣此舉前縱許之因今以餘識喻合則因性之言無用此下又以縱奪之詞結破縱云彼雖因用非所緣性此亦如是實為有用謂彼極微雖有因用但非所緣若此餘識亦以極微為生因方許極微實有能生五識之用奪云然非聲香味觸邊所有極微色相可是餘根之識生因既不能生識又不作所緣是知雙支全破要在餘識之喻耳二雙支全破竟通上二別破極微竟下三別破和合分四一推彼轉計論曰和合於五識設所緣非緣彼體實無故猶如第二月色等和合於眼識等有彼相故設作所緣然無緣義如眼錯亂見第二月彼無實體不能生故如是和合於眼等識無有緣義釋曰有說於識自體無聚現故非是所緣如根衆微由境相狀安布於識是彼相性此非有故理即說其無有聚現如是且述鉢羅摩怒不是所緣彼之能立不相應故及非境性量善成故此舉他宗轉計和合為所緣緣義有說於識自體無聚現故非是所緣者謂有諸餘乘己知於識自體無有極微聚現相故非為五識所緣如根衆微由境相狀安布於識是彼相性者因前量以如根之喻已破衆微故自服云若此極微為境而有相狀安布於識方是彼識所緣相性此非有故者服善之心如此故云理即說其無有聚現相故如是且述鉢羅摩怒不是所緣者鉢羅摩怒此云極微言且述極微不是所緣意以合和為所緣耳故護法師云彼之能立不相應故及非境性量善成故意謂他宗前以所立比量為極成今以極微不是所緣是能立不相應而非境性之量反善成矣若爾總聚是境然由所說諸有能立若望謨阿宗皆有不成性理實如此護法師推他宗轉計和合兼明大乘唯識宗無外色作所緣緣之意若爾總聚是境者推他宗自不將極微為所緣緣必以和合為所緣緣破云然由所說諸有能立極微和合二法若望謨阿宗旨皆有不成所緣緣性其唯識理實是如此謨阿者梵音之訛正云摩訶廣大義今云謨阿宗即大乘宗然而總聚實有彼相有是所緣無因性故由彼相識不能生其總聚相識總聚不生彼既不生此識如何令此緣彼所緣之相不相應故非所緣義由此前云彼相應理斯乃不成釋成謨阿宗中不許和合作所緣緣義先縱云然而總聚實有彼相有是所緣之境破云無因性故謂總聚法無有生識因性釋云由彼相識不能生此句乘上無因性一句連接下文以破所緣緣義其總聚相識總聚不生者牒上不生之意破無生識之緣彼既不生此識如何令此緣彼所緣之相此二句破無所緣之境意謂彼總聚相既不能生此識如何令此不生之識緣彼所緣之相故云不相應故非所緣義結云由此前云彼相應理斯乃不成一推他轉計竟下二明內正義若爾何謂所緣之相此問所緣之境以何為相問意謂若如汝謨阿宗中極微和合皆非所緣其所緣境以何為相凡是境者理須生其似自相識隨境之識彼是能生彼是所緣有說凡為境者理必須是心及心生起之因也此既生已隨境領受而與言論於時名此為所緣境若義具斯二種相者此乃方合名為所緣是能生性所緣之境引阿笈摩此即便是說生緣性由是生因彼識生緣共許是其所緣之境自體相現此中無益故不言之此以正意答所緣緣之境謂凡是五識之境理當生似五塵之五識以眼根對色時生似色塵之識隨色立名名為色識如是乃至觸識亦爾故名隨境之識彼是能生彼是所緣者謂即一法有二功能既為生識因必作所緣境此之正意不唯大乘宗中自許小乘部中亦共許之引小乘部中證云有說凡為境者理必須是心及心生起之因也此明不以外色作所緣緣義此既生已隨境領受而與言論於時名此為所緣境者釋上一法具能生所緣二種功能故結云若義具斯二種相者此乃方合名為所緣彼經自釋二相云是能生性所緣之境此下護法師自釋引證之意云引阿笈摩此即便是說生緣性阿笈摩者是小乘大衆部中經名生緣者生是能生因緣為所緣境謂識從此生緣此為境故下釋云由是生因彼識生緣共許是其所緣之境自體相現此三句釋彼部中共許有此二相方作所緣此中無益故不言之者此中是先引正義猶未詳明論中縱許之意故不盡言耳二明內正義竟下三縱許所緣能非總聚是能生者非實事故由其總聚不是實事此於有聚一異二性不可說故又復無有不實之事能有生起果用功能猶如二月如第二月不能生識此牒論中比量之意論之即本論云和合於五識設所緣非緣彼體實無故猶如第二月能非總聚是能生者非實事故謂他宗計和合為生識之因論中以比量破其非實故曰能非由其總聚至不可說故者釋上非實事謂總聚法一異二性不可得即如極微合為總聚二性不可得若名總聚除極微外無別總聚若名極微既合聚已焉得又名極微是知二性不可得又復無有不實之事至如二月者謂不實之法不能生果喻如二月故云如第二月不能生識以第二月不是實有喻和合之境不實故不能生識第二月相若爾何因有斯相現此問二月是假同於總聚總聚之法極微所成方知是假二月假相何因而有根損害故若時眼根由翳等害損其明德遂即從斯損害根處見二月生非實境故此答明二月生因乃虗妄非實即本論云如眼錯亂見第二月彼無實體不能生故由此二月縱有彼相然非斯境如第二月縱令此識有彼相狀由不生故不名斯境合喻以明縱許之意先明喻體後以喻合法由此二月縱有彼相然非斯境者是明二月之體虗妄非五識所緣如第二月至不名斯境者以喻合和合之法體非實故既不可名生識之因安得又為所緣之境此由非實事有性等總聚不是識之生因非實性故牒釋他宗轉計之意破非生因謂由前非其極微實事即轉計有性等總聚此不實事縱有不是生識之因且縱許為所緣之境故本論云如是和合於眼等識無有緣義如第二月由斯方立非因性故不是所緣還如二月將破能生所緣之執故合一喻以通妨又復將此第二月喻於彼相因應知說其不定之過復由識義理成就故過是相違此明言陳意許之意謂此月喻於總相處但顯不定生識之過容有可緣境相此言陳也若由唯識義理成就彼所緣之情亦遣矣故云過是相違意許之宗如斯而已三縱許所緣竟下四雙支全破復緣眼識不緣青等聚集極微為由彼體非生性故如餘根識此喻共許故不別言第二月喻非實事故應知此是於非因性而成立之如所說之縱有相性然非彼境斯言復是非彼因義此總破外色必不能為所緣緣義復緣眼識至非生性故者此兩句明非因不得為所緣上緣字因也由也下緣字是識緣境義問復由眼識不緣青黃赤白總聚極微者何也答云為由彼青黃赤白總聚極微體非是能生眼識性故如餘根識至不別言者謂耳等識不能緣色相者人所共知是謂共許此喻眼識非青等所生而不緣青等者如餘識不緣色相為境亦非色相所生第二月喻至於非因性而成立之者以喻外色非實但以不能生識而立之此單縱也如所說之至非彼因義者結牒上文雙奪之意謂如上不能生識之所說縱有和合相然非彼識境斯言即上如所說之縱有相性然非彼境之言故云復是非彼因義不得為所緣耳若言無有第二月者如何現見有二相生前以月喻總聚是假不能生識故問月何因生知其是假今以月喻總聚是假非五識境故問既許非境如何現見謂從內布功能差別均其次已似相之識而便轉生猶如夢時見有境起由此令似妄作斯解於其月處乘更覩餘答明二月之相非眼識所緣乃意識虗妄分別相現謂從內布功能差別者由眼根損害有差別故均其次已者是先損根後現月似相之識而便轉生者謂相似二月相貌之識轉變生起第二月相豈謂實有耶猶如夢時見有境起者喻意識所見二月之境由此令似妄作斯解者謂相似月之意識妄分別有二月相生於其月處乘更覩餘者謂乘月喻即知所餘和合之境亦是意識所緣何定執為眼識之境耶諸有說云而於眼識雙現之時此二次第難印定故將作同時於斯二種相貌之後意識便云我見月之第二月也或復有云於共許月數有錯亂由根損故此引二師之言以證第二月相是意識所緣諸有說云至將作同時者謂眼見二月真假難分將作同時亦難印定此非眼識所取之境明矣於斯二種至第二月者此引意識虗妄計度以明月相非五識境或復有云至由根損故者謂共許第二月數有錯亂數者頻頻有無義皆由根損故耳此又引亂意識以證第二月相實非五識所緣若望不許外境之宗如斯衆見但是妄執此引正宗總破心外有法但是妄執都無實義由非眼識所緣無間引生意識能於一時雙變二相作如斯解見二月耶又於聲等緣彼之識不知其次應有二聲等見同時起耶好眼之人意識次第尚多難解何況依於色根之識測其差別便成多有二相等見一旃達羅若時離識許實有者斯乃何勞妄增二月而言於數有其錯亂此設難比例而結破之由非眼識至見二月耶者意謂由我破汝眼識不能緣二月相莫得汝將意識見二月相就作如斯解為眼見二月耶例難云又於聲等緣彼之識本不知有二聲次第時應有二聲等見同時起耶又比例云好眼之人揑目生月意識於此月處真妄次第尚多難解何況依於色根之識於其月處測其真妄前後差別便成多有二相等見一旃達羅旃達羅者此云月意謂眼識不能於一月上有二相等見而言二相等見一月者皆西域倒語結前意云若於雙現二月相時即許離識是實有者斯乃何勞前引二師妄增其說彼言第二月及數有錯亂俱非實義故何執為實有四雙支全破竟通上三別破和合竟下四總結二執論曰故外二事於所緣緣互闕一支俱不應理釋曰離識之外執有二種極微總聚此皆闕其一分義故又如所說能立能斥道理力故以之為境成不相應闕一分故自體相現及能生性具斯二分方是所緣於極微處即闕初支於第二邊便亡第二若如是者如向所論二種過失重更收攝令使無差總結前二種過自體相現者是初支及能生性者為第二故云於極微處即闕初支是極微無自體相現闕所緣也於第二邊便亡第二是和合無能生之性闕生因也復結云若如是者如向所論二種過失重更收攝令使無差此乃警其勿犯耳四總結二執竟通上一舉標中二執別破竟下二舉二種轉計別破分二一執極微體中具和合分二一牒彼執詞推明轉計之意論曰有執色等各有多相於中一分是現量境故諸極微相資各有一和集相此相實有各能發生似已相識故與五識作所緣緣此亦非理所以者何和集如堅等設於眼等識是緣非所緣許極微相故如堅等相雖是實有於眼等識容有緣義而非所緣眼等識上無彼相故色等極微諸和集相理亦應爾彼俱執為極微相故釋曰有說集相者於諸極微處各有集相即此集塵而有相現隨其所有多少極微此皆實有在極微處有總聚相生自相識實有性故應是所緣斯乃雙支皆是有故此牒他宗轉計之意謂前論主於極微邊許有能生因於和合邊許有所緣境若以二法單為所緣緣者則有各闕一支之過今合二法為所緣緣雙支皆有故他意謂衆微合聚而有和合相現者是極微體上具有和集德相所以合聚時方有相現故本論云於中一分是現量境此指極微體上本具和集之相為現量境故轉計云於諸極微處各有集相謂諸極微體上各各具有總聚相故即此集塵而有相現者許有所緣境隨其所有多少極微此皆實有者許有能生因故結云在極微處有總聚相生自相識實有性故應是所緣斯乃雙支皆是有故此即於前所有成立求進無由為聚集相即是極微為不爾耶此護法師推外宗轉計之情自以為然矣由諸境義有衆多相即此諸微許有微狀亦有集相如何得令二相共居一事為應理乎此明他宗將實有之境以例極微和合之相轉計論主牒計破之先牒計由外諸境有衆多相汝即將此諸微許有極微狀亦有和集相次破云如何得令二相共居一事兩存其相為理乎有衆多相凡諸有色合聚之物皆以地等四大為性彼皆自性有勝功能青美等相隨事隨根而為了別即此於其衆多相處極微之處有總集相即將此相為眼等識所行境故是現量性牒釋上意有衆多相者牒上由諸境義有衆多相一句而釋之釋云凡諸有色合聚之物者即色香味觸四塵也皆以地等四大為性者謂外四塵之法皆以地水火風四大為性彼皆自性有勝功能者亦指四大功能青美等相者即四大所變青黃赤白美惡等相隨事隨根而為了別者是隨根塵相對而緣即眼見色耳聞於聲等此下推比例之情即此於其衆多相處極微之處有總集相者謂彼見此衆多相知是四大為性彼就妄計極微體上具有總集之相即將此相為眼等識所行境故是現量性者謂真實極微體上既具和集之相此相亦是實有實有之法是現量性即將此相為眼等識所緣緣一牒彼執詞推明轉計之意竟下二展轉引喻難破勝劣之情若如是者於諸微處識有聚相何不言之塵有聚相何不言識有聚相耶所以復云然於微處有總聚相即以此言為其方便亦顯識有極微總相若爾一一極微有此相者何故復云總集相也此翻覆推徵就計難破若如是者謂他宗若執極微自體具總聚相而為眼等識所行境難云於諸微處生眼等識亦應有總聚相何不言之復難云塵有聚相何不言識有聚相耶謂塵之聚相既可言則識之聚相亦可見矣復徵他意所以復云然於微處有總聚相即以此言為其方便亦顯識有極微總相謂以方便顯根識有極微總相得作所緣緣義下就他計破云若爾一一極微有此相者何故復云總集相也謂一一極微有此自相何故於極微體上復云總集相既以極微為相則總集相不可得若以總集為相則極微相又不可得此二不可並存耳色聚衆多極微分別是論所許此即是其總聚性故不是實有如前已陳何勞重述有別意趣縱令實事別別體殊然此相狀但於集處更相藉故而可了知說觀集相更無餘矣此言他宗轉計濫同第二計義色聚衆多者即和合相極微分別者即極微體分各別是論所許者謂此二種原是論中縱許之法此即是其總聚性故至何勞重述有別意趣者謂不實之法前已陳過不勞重述別趣縱令實事至更無餘矣者謂極微之體縱具集相然欲觀者必得和集一處更互相藉而可了知說觀集相無過於此矣若謂一法體上兩存其相豈非妄計乎又復設使諸有極微合聚為性然而一事有其勝劣隨事觀之且如蒼色是其地界如是等說誠為應理縱許如是如極赤物初生起時多事皆強遂無容矣依容有處作此譸議此推他宗轉計設喻以破之又復設使諸有極微合聚為性者是舉外宗以極微體上具合聚性然而一事有其勝劣隨事觀之者彼以勝劣為然遮前眼識不見極微及具和集之過故引喻云且如蒼色是其地界此出喻體謂且將地界觀之但見蒼蒼之色則知地界彼以蒼色為勝地界為劣矣如是等說誠為應理者結彼勝劣等言自謂義理切當縱許如是者是護法師且許如此下設喻破云如極赤物初生起時此舉喻體多事皆強遂無容矣者容字義受也隱也謂赤物初生時其餘多事皆強遂無隱其初生赤物依容有處作此譸議者譸誑也謂有一處赤物生時而能含受容隱使其不見許汝作此勝劣之言譸議謂此他宗以極微為劣以和合為勝以勝隱劣不必求見極微故護法師以赤物喻極微雖劣而多事皆強勝特不能隱此破他宗既執兩存其相又不可以勝劣為救耳若爾如何說諸極微非根所見又復如何唯有如知能見極微此他宗反引大乘中二義為問若爾如何說諸極微非根所見謂若以赤物之喻求見極微汝大乘中何言諸極微體非眼根之識所見又復如何唯有如知能見極微者謂汝大乘中又言唯有意識觀察極微如知能見者是意識分別妄見耳由其塵相非是識義非是依根識之境界故曰非根非根之義獨是如知之所觀察復如何理現見極微塵形不覩如堅性等如堅潤等於彼青等縱有其事非是眼等識之境界根之功能各決定故塵亦如是無違共許豈非顯微無其堅性由別體故此對宗法許其十處但是大種斯言無過然此已陳答上問意復引喻以明之由其塵相非是識義者謂極微之相不是根識體上變帶之義非是依根識之境界者謂既非變帶之法豈是根識境界故曰非根者結答非根之問非根之義獨是如知之所觀察者答上如知能見極微之問復如何理現見極微者此破他宗前執極微為所緣極微既是觀察想相之法有何道理現見極微上答二問下引喻明塵形不覩如堅性等者此牒本論中不許所緣之意論中頌云和集如堅等設於眼等識是緣非所緣許極微相故和集如堅等者謂他宗計極微體上具有和集之相論主以如堅等破之堅等即堅濕暖動四性乃四大之種子亦非眼等識所見故論主縱云設於眼等識是緣非所緣許極微相故謂縱許他宗執極微體具和集相此相即是極微既是極微原只許為生識緣不得作所緣境故云許極微相故如堅潤等於彼青等縱有其事非眼等識之境界此護法師明性相二色俱非眼等所緣謂堅等變為青等色時不唯堅等自性非眼等識所緣縱是青美等有形色相亦非眼等識之境界根之功能各決定故者謂青等之色容許眼緣而非耳鼻可取者根之功能不忒耳塵亦如是無違共許豈非顯微者塵即極微亦如堅性非眼所取他宗以勝劣之理推之謂極微不可眼見此共許之意豈不顯極微非眼所見乎無其堅性由別體故者謂眼識上無堅性與眼識上無極微有別極微但是妄情所計不同堅性種子實有此對宗法許其十處但是大種者謂此唯識宗中原許堅潤等性為能變根塵十處為所變能變即是種子所變即是相分以種子相分唯心所現故云斯言無過者不同他宗妄計心外有法之過此根塵法從因緣生元不離識故言無過然此已陳者謂此能所變性於上有衆多相章中已陳其詞矣二展轉引喻難破勝劣之情竟通上一執極微體中具和合竟下二執和合體即是極微分三一牒彼執詞推明泛然妄計論曰執眼等識能緣極微諸和集相復有別生瓶甌等覺相彼執應無別非形別故別形別非實故瓶甌等物大小等者能成極微多少同故緣彼覺相應無差別若謂彼形物相別故覺相別者理亦不然瓨等別形惟在瓶等假法上有非極微故彼不應執極微亦有差別形相所以者何極微量等故形別惟在假析彼至極微彼覺定捨故非瓶甌等能成極微有形量別捨微圓相故知別形在假非實又形別物析至極微彼覺定捨非青等物析至極微彼覺可捨由此形別惟世俗有非如青等亦在實物是故五識所緣緣體非外色等其理極成釋曰汝瓨甌等覺者汝如是證者於瓨及甌便成根覺相似而觀於其自境識不差故復由根覺隨現有境而相生故識境不別此牒他宗第二轉計前以二事單計論主立二比量次第破後即轉計真實極微體具和集之相雙顯二法皆有故論中復以和集如堅等之偈破之今又轉計和集之體即是極微即本論云執眼等識能緣極微諸和集相復有別生故論中又以瓶甌等覺相之偈破之此中云汝瓨甌等覺者此舉所執事體下推所計情狀汝如是證者於瓨及甌便成根覺相似而觀謂汝以此事證成根識雖依極微引生相似瓨甌即以瓨甌為境觀之於其自境識不差故者謂各自境與所生識決不差別復由根覺隨現有境而相生故識境不別者謂不獨於瓨甌邊得生根識隨所有境則似境之根識亦生根識既生亦與境相不別如何得知由匪於其瓨甌等處衆微有別而此言說此設問答以明妄計如何得知者問上泛然妄計之意答云由匪於其瓨甌等處衆微有別而此言說謂彼不於瓨甌處審其衆微之體有別無別而泛然虗妄言說一牒彼執詞推明泛然妄計竟下二展轉引喻難破極微無別然諸極微以總聚相而為其境固非於彼瓨等自體了別之時於衆多聚體有片別彼之實事相貌之外無別積聚體可得故緣彼根識便成相狀無有差殊由此方成於塵自體是所緣性復非於彼無別相處覆審之緣異解性故此順所計而難破之然諸極微以總聚相而為其境固非於彼瓨等自體了別之時於衆多聚體有片別者此兩句順彼執情謂他宗執極微生識以總聚相為境其總聚與了別識無片分有別固然如此既順己復難云彼之實事至是所緣性者謂極微實事之外無別積聚瓨甌體故緣彼根識便似極微相狀而生由此方成於極微自體是所緣性今推極微之體不顯瓨甌之相無實安得對瓨甌假相審觀極微自體為生緣耶所以破云復非於彼無別相處覆審之緣無別相處謂極微無有差別形相覆審之緣謂極微之體被瓨甌蓋覆若欲求見極微必是詳審卜度為緣故責云異解性故如緣青等若相殊故所言殊者相謂形狀布置有殊於其瓨甌胭腹底等殊異狀故由境有別覺乃遂殊誠為應理無如是事非於根識所觀境處極微有殊然此總聚是三佛栗底而此總聚非根識境此已斥破復非非境有別而令識相有殊可為應理此推他宗轉計復破識相有殊如緣青等是引喻若相殊故至覺乃遂殊是轉計所言殊者下三句是釋相殊謂所緣境相安布有別瓨音缸長頸瓶也胭瓶頸也腹瓶腹也底瓶足也瓶雖是一而胭等各別故他宗轉計云由境有別覺乃遂殊耳誠為應理者牒執意無如是事者是破詞非於根識所觀境處極微有殊者顯極微無別然此下破總聚是假三佛栗底即三摩鉢底此云假謂此總聚是假有法而此總聚非根識境此已斥破者謂此假有法非是根識境前第二月喻已破其非矣復非非境有別而令識相有殊可為應理者此三句破極微無別不能生差別之識非境有別者即無別境也謂極微境無別何得以無別境而令所生識有其差別耶故本論云瓨等別形唯在瓶等假法上有非極微故復如何知諸極微處別狀非有此是外人問上破意極微形相無別異故此總答問意下託物例顯凡諸事物有支分者必有別狀於方處轉方處轉即方位布列此託外有支分之物必有別狀例顯極微一體無別狀故然諸極微體無方分至窮極處斯即何曾得有形別於瓨甌等縱令事別而極微性曾無有殊斯乃一體無增減故是故定知於總聚處非實物有凡有方隅布列形狀皆非根識所行之境例顯極微無方分義然諸極微至斯即何曾得有形別者謂極微之體無別相故故本論云彼不應執極微亦有差別形相於瓨甌等至無增減故者謂所對瓨甌雖別而極微亦何曾有增減差別之相是故定知於總聚處非實物有者釋成總聚雖有形別而非實物不能為根識境故下結云凡有方隅等二展轉引喻難破極微無別竟下三通釋前義結破異見非理上來如此衆多詰責意欲顯其有別相故由他宗欲顯極微有別故上來有衆多詰責之詞瓨甌等覺非以別事為所緣境猶若蘇佉毒佉情矣此牒前執瓨甌等義責之瓨甌等覺非以別事為所緣境別事即瓨甌謂所對瓨甌而生瓨甌相似之識不以瓨甌別事為境意許極微為境生差別識故責云猶若蘇佉毒佉情矣蘇佉此云樂毒佉此云苦謂苦樂本空皆衆生情想顛倒妄計極微和合本不生識而他宗計以生識者亦顛倒妄計之情矣然而極微是不別境即是彰其非彼境性此中雖言極微不別意在破彼瓨甌非境若相殊故方言殊者此言意顯向云非以不別之事而為境者是立已成彼意說言極微為境其實無殊然為形相別故別也牒本論中若謂彼形物相別故覺相別者之意推他宗轉計若相殊故方言殊者謂由瓨甌形別覺相亦殊護法師推他意云此言意顯向云非以不別之事而為境者是立已成謂前和合章中不以不別極微為境是以和合為境而論主縱許有所緣性故曰是立已成彼意說言下護法師推彼轉計如文極微無殊我亦共許是立已成由諸極微量無別故此顯殊事是其別境答非已成或可牒上無殊之意明轉計殊事為境極微無殊我亦共許者是論中原許極微為生因故云是立已成由諸極微量無別故此顯殊事是其別境者牒他宗自許極微不別轉計瓨甌別境答非已成或可者是護法師評彼執意以前量所立極微有已成非已成二義許有因性是已成不許所緣是非已成今顯殊事為境以答極微非已成之所緣或可此明諸根之識於瓨甌等無有極微相狀性故非是所緣猶如餘識餘識謂意或餘根識但緣青時無黃相故於諸極微雖體衆多無差別故而諸根識差別相故斯乃共成非塵狀性結前三節所論復引喻決之此明諸根之識至非是所緣者謂極微之體既無別狀縱有瓨甌等別俱非根識所緣猶如餘識餘識謂意或餘根識但緣青時無黃相故此四句牒喻中識境各決定義但緣青時無黃相者謂且如眼識緣青色時其青不能為黃色此境之決定也即青色為眼識所取於耳等識必不能緣此識亦決定矣於諸極微雖體衆多無差別故而諸根識差別相故者謂極微無別不能供諸識所取識性各別故耳斯乃共成非塵狀性者以此節之意亦共成極微非有差別相狀頌於極微差別之言同前問答若其總聚許覆相已形非實境理方可成如斯勝理是應成立若言離極微如是等如離彼者彼覺便無故猶如軍等此言瓨等是非實義由非實事此顯餘宗諸非不實皆非捨彼相違事也如於聲等青覺非有此形相別是覆相有以其瓨等為境性故牒本論中頌詞解釋頌云極微量等故形別惟在假析彼至極微彼覺定捨故同前問答者前章云復如何知諸極微處別狀非有問也極微形相無別異故答也若其總聚許覆相已形非實境理方可成此釋前二句頌謂若彼知極微量等相無差別乃總聚之形蓋覆而總聚之形是假非實此正理也故云如斯正理是應成立若言離極微如是等如離彼者彼覺便無故猶如軍等此釋後二句頌離即析也謂若形別所生覺相亦差別者析彼影相至極微時所生覺相決定無有故自釋云此言瓨等是非實義由非實事至皆非捨彼相違事者總結他宗非實事非不實事皆有相違之過非實事者即瓨等非不實事即極微謂由瓨等有相違過即顯極微亦有相違過以瓨等不實不得為所緣緣則極微雖實亦不得為所緣緣耳如於聲等青覺非有者喻上相違義聲等即色外四塵青覺唯約眼識以聲等四塵望於眼識是相違義喻彼所執極微總聚望於根識亦是相違此形相別是覆相有以其瓨等為境性故者釋成相違不生識義謂此瓨甌之形雖別是覆極微實相而有實相既覆何得引生差別之識識不生者汝以假有瓨等別形為境性故不能生雖引衆多異見道理而竟不能顯其極微實事之體有其差別結破異見如文可知三通釋前義結破異見非理竟通上一破彼執竟下二明自宗分二一釋內境論曰彼所緣緣豈全不有非全不有若爾云何內色如外現為識所緣緣許彼相在識及能生識故外境雖無而有內色似外境現為所緣緣許眼等識帶彼相起及從彼生具二義故此內境相既不離識如何俱起能作識緣決定相隨故俱時亦作緣或前為後緣引彼功能故境相與識定相隨故雖俱時起亦作識緣因明者說若此與彼有無相隨雖俱時生而亦得有因果相故或前識相為後識緣引本識中生似自果功能令起不違理故若五識生惟緣內色如何亦說眼等為緣識上色功能名五根應理功能與境色無始互為因以能發識比知有根此但功能非外所造故本識上五色功能名眼等根亦不違理功能發識理無別故在識在餘雖不可說而外諸法理非有故定應許此在識非餘此根功能與前境色從無始際展轉為因謂此功能至成熟位生現識上五內境色此內境色復能引起異熟識上五根功能根境二色與識一異或非一異隨樂應說如是諸識唯內境相為所緣緣理善成立釋曰據內境體謂立自宗所緣之事若也總撥無所緣境便有違世自許宗過四種緣性於經說故據內境體即陳那菩薩所立相分色謂立自宗所緣之事者乃護法菩薩之釋詞若也總撥無所緣境便有違世自許宗過者謂唯言唯識是總撥無所緣所以自宗立萬法唯識者不無萬法彰萬法唯心所現耳世人共知五識緣五塵境自宗亦許有四緣生八識之說若總撥無所緣境是二過之所不免故云四種緣性於經說故四種謂親因緣所緣緣增上緣等無間緣緣義詳於唯識論中茲不繁引此中內聲為顯不離於識而有所緣言境體者是所取分是識變為境相之義此釋內境二字以彼執外故有內名而言內者顯不離識有所緣義內境之體即相分色以從本識變為境相所取義成然在識外別分而住將以為境違世之過如前尚在此明內境亦與世相違然在識他下謂外宗計極微和合是心外之法故云然在識外別分而住將以為境下謂今將內色為境而世人不許有內境即與世相違如前不立所緣便有違世之過故云尚在由諸世俗共許於境在外而住應云如外此不離識其所取分如外而現云我見境生其慢想實此為因如於眼識現其髮等此釋如外現義由諸世俗至此不離識者謂世人共許境在外住論主云內境如外境顯現其內境實不離識故云如外者為遮違世之過實不即外其所取分謂由相分色上有所緣功能故名所取如外而現者彼執心外實有色境故言內色如外色現云我見境生其慢想者釋如外現義謂前五識帶淨色根依浮塵根對五塵時必有第六意識同起緣境安立名言云我見境或生慢想此皆意識計度分別非五識義實此為因者謂雖內色作所緣境而亦實是生識之因如於眼識現其髮等者以喻內色如外現義謂目勞者則見毛輪現於燈上雖似外現於燈而實目勞而有以喻色雖似外實不離於能變之心外境雖無謂實無其在外之境非了性故以理究尋不可了其自體定在於外縱令許彼實有外相然非識緣非彼相性故非極微相現如似外相顯現之時此即是其所緣緣也彼相相應故本論中云外境雖無而有內色似外境現為所緣緣今護法師牒此三句意釋之外境雖無此是牒論文一句釋云謂實無其在外之境非了性故了性者是明了其境為了性謂若實無外境以何為所緣而名了其境以理究尋不可了其自體定在於外者謂以唯識之理推究則不可以外色為境是許內色作所緣緣縱令許彼實有外相然非識緣非彼相性故非極微相現者牒彼餘乘前計極微原是妄心分別實無相狀當情所以破云縱令汝許極微實有外相顯現然非五識所緣以彼極微非是引生五識相性故非極微相現得作前五識境已上釋外境雖無此下結顯相分色如似外相顯現之時此即是共所緣緣也彼相相應故此中結詞即本論云而有內色似外境現為所緣緣之義由若與相理相應故者此即是此如因性等由與自相理相應故復顯所緣差別體相如云識有彼相故等明不假藉外事為境如情所計境相隨生牒釋上章彼相相應故一句以明所緣緣義由若與相理相應故者是牒上句此即是此者謂相分色有二功能此是能生此是所緣故曰此即是此如因性下釋上此即是此之意如因性等等於所緣此句總標由與自相理相應故謂由所生識與相分理相似生故方是生因復顯所緣差別體相者謂五識生即將相分為五塵境故云復顯差別體相如云識有彼相故等是引若識有彼相彼是此之境之義而證之明不假藉外事為境者結成內色不依外事如情所計境相隨生此以喻明謂情識計度則有獨影境相隨識轉生喻相分色與識同起故不假藉外色為境又情所計若離於識非外有故此之境相元不離識由此名為內境相也釋喻以明內境相分又情所計若離於識非外有故者謂喻中若離能計之識則隨生之境非外有故亦是境不離識此之境相元不離識由此名為內境相者謂法中相分境與識元不相離故此名焉一釋內境竟下二辨差別此中內聲言不離識本無其外望誰為內及從此生有此方生或可從此由第六五識有別故由非離境得有其識是故有此方乃識生不言第五二法合故明其所緣道理合故顯能立也此即但以共相之境為其能立釋成內聲復顯法喻有差別義此中內聲至及從此生者謂他宗所執心外有法是故論主顯不離識說有內名外法若無內亦不立故云本無其外望誰為內及從此內而生識耶有此方生下正明差別本論云帶彼相起及從彼生是明所緣緣也帶彼相起明有所緣及從彼生明生識緣今以此字換彼彼字故云有此方生謂此相分定先有故方乃識生見分雖亦定有但識生時相分別故或可從此者謂前喻中情計境生是從此相染識而生故云從此言或可者以從字義有相從從生之別若是相分與識同起是相從義若獨影境唯依相分染識變現即從相分而得生起是從生義由第六五義有別故者謂前五相分實有種生名實性境第六相分染外相生名獨影境故有差別先釋前五正意云由非離境得有其識者謂不離相分境而得識所緣是故有此方乃識生者謂有此相分境方乃引生識不言第五者即前第五聲意謂不以異品作言陳意許二法合故者謂一相分上已有能生所緣二義故不待立比量而自知矣明其所緣道理合故顯能立者釋上二法合故之意此即但以共相之境為其能立者謂許能生所緣共相必是內境方可成立若差別者其仳若南不緣外事於其夢位以為顯示如說二種為一能立識有彼相復是識生緣此二用方成一量釋前差別意若差別者牒前差別名梵語仳若南此云識蘊即意識不緣外事於其夢位以為顯示者謂夢中緣境不是外事亦可顯示為內境相如說二種為一能立者謂如說言若識有彼相及彼是此之境彼說一相分上有二功能名為二種識有彼相復是識生者謂夢中識有夢境相其夢境相復是識生緣此二用方成一量者緣由也謂由有此二種用故方成內境一比量義且復縱許有其內相但觀外境妄有相故言無他相如情計境生其領受境之相狀列在於內將為應理如何是彼一分得作同生之緣其所取分離識無故斯之一分復還生識便成自體相違之過復還是彼一分性故如能取分斯乃便成匪能生性但由外相染識而生此即相分與識同起非二同時有因果性如牛兩角又匪於其不異之事同在一時以同伴聲而合說之亦非於識別說有境此破差別所有之內相不同相分內相義且復縱許有其內相者謂且許有夢中境相但觀外境妄有相故言無他相者謂曾觀外境於夢心變現故言無他如情計境生者復以喻明其領受境之相狀列在於內將為應理者謂外境染識所生將為實有相分之理如何是彼一分得作同生之緣者謂若將夢境許有能生所緣二用唯得一分所緣境如何又為生識緣其所取分離識無故者此破無所緣義謂夢位境唯是夢中意識所變若離意識則所取境相自無矣斯之一分復還生識便成自體相違之過者謂夢中境相元是識所變起何得反生能變之識耶若不能生識還是一分所緣境故云復還是彼一分性故如能取分所乃便成匪能生性者此破識不能生義謂以夢中境相為所緣緣者境從識生安得以境先有反生能取之識耶但由外相染識而生者此言夢境不實如此此即相分與識同起者結前差別意前謂及從此生是本論中帶彼相起此夢境相正喻相分與識同起但以夢境不能引生於識為過故下連起三難一難云非二同時有因果性如牛兩角謂此夢境非如見相二事同時有引生識為因所生之識為果如牛兩角各皆實有二難云又匪於其不異之事同在一時以同伴聲而合說之謂夢境相又不似其相分與識原是不異之事同在一時以同伴不離之聲而合說之三難云亦非於識別說有境謂夢境相依識妄見亦非內色與能緣識各別實有斯乃如何名同伴性問上見相同時之意理實如是然由相狀差別力故猜卜為異而表宣之由有見分相分之殊遂將此識而有差別答上問意以明唯識之理本同然由業力而顯差別理實如是者答同伴之問問意謂大乘既立唯識為宗何言同伴若言同者是有其二法矣故此答云理本無二實唯識爾然由相狀差別力故者謂藏識體上現起同伴二分故云差別猜卜為異而表宣之者謂識生二法元未有名惟聖者推詳卜度為見相異而表宣之由有見分相分之殊遂將此識而有差別者謂藏識之體元一真如由現見相之殊即顯藏識出生差別雖有二分差別元從一識體生識體離染即是真如故曰三界唯心萬法唯識若如是者緣性亦應但是所執非分別事有自性體斯乃應成非真緣性此罔相違此外難也謂若實是唯識理但由猜卜立見相名者即汝大乘所立相分但是分別妄執豈分別妄執之事得有自性體耶既無自性則汝相分非真緣性自既非真前破極微總聚為相違者是所罔矣由其緣義於餘所執差別之境亦共許之如等無間滅同分之識為斷割時此識亦以四種多緣而為緣也此答必有真緣性義由其緣義於餘所執差別之境亦共許之者謂由內有生識緣義故於外執極微之境亦共許之極微不能生識而況且共許豈內相分真能生識而自無緣義乎如等無間滅同分之識為斷割時者謂等無間緣不引生意識與五識同時斷割者是分離不共之意謂此五識縱無意識同時自亦有四種多緣安得獨無所緣緣也觀所緣緣論釋記問答釋疑問何緣造此所緣緣論答為明內外色故何名外色曰他宗以極微和合為五識境及世人見根身器界皆執境在心外故名外色何以得知曰釋論云由諸世俗共許於境在外而住所以得知問極微和合從心變現皆不離心何名心外答彼執境在心外各別實有故名心外本論云諸有欲令眼等五識以外色作所緣緣者或執極微許有實體能生識故或執和合以識生時帶彼相故是執外義問何名內色曰即前五識緣現量境及第六識不作解時名為內色問彼之外色以極微和合及根身器界為體汝立內色以何為體答即彼世人所見根身器界為體世人見山即起堅持想相安立山名見水即起流動想相安立水名此皆意識妄計器界為心外有根身亦然若前五識緣山河等決定不起山河等想雖有物對不起對想明證衆境不起證想取境清明無清明想諸想不起心境不分故名內色釋論云此中內聲為顯不離於識而有所緣又云此中內聲言不離識本無其外望誰為內故知色無內外由能緣識有差別故立內外名謂前五識緣山河等現量證時不執為外即山河等名為內色若第六識緣山河時從彼變起山河等相執為外有即山河等名為外色問何名觀所緣緣曰觀是見分即能緣之心所義是相分即所緣之境緣是相分中發識功能名勝義根本論云識上色功能名五根應理功能與境色無始互為因應知五勝義根遍一切法不同浮塵局一形體既名勝義體即真如故說真如遍一切法此即大乘萬法唯識問既名萬法何曰唯識答謂緣境時無分別想心境一如即一切法本自寂滅豈非當體唯心乎問觀所緣緣論近講解者都無比量之說今釋論中多言比量何也曰西域釋義原有二種若解經論用六離合釋若破外執用三支比量今造本論為破外執故本論中立二比量護法釋之初量云極微前陳有法於五識設緣非所緣宗也彼相識無故因也猶如眼根等喻也次量云和合前陳有法於五識設所緣非緣宗也彼體實無故因也猶如第二月喻也問本論云若此與彼有無相隨彼說何義曰此即五識彼即五根有是現行無是種子謂識與根俱有種現而不相離是唯識義
