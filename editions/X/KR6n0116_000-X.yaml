body:
  text: 觀所緣緣論釋記序觀所緣緣論釋者護法菩薩釋陳那菩薩觀所緣緣論也陳那菩薩深窮緣性洞徹見源標真殄謬明心外無境經部師等以外色極微和合為所緣緣斥其互闕一支俱不應理菩薩申義內色如外現為識所緣緣許彼相在識及能生識故古大乘師略於挾帶則本智緣真如時為所緣緣似有失而小乘正量部不許變帶則眼識緣色時所緣緣義不成菩薩理善成立二支斯備如是了達方知心外無境凡所見法是見心也然文約義豐所含淵𧷤故護法菩薩發其餘蘊盡抉玄奧造釋以弘其致揚正理之光耀溢義海之波瀾令毒智斂而邪焰熄矣復緣所譯之文奇嶮讀者難通大光明山高原上人義學精覈久研斯典妙析奇致為之筆記譬之尋河得源而支流委曲皆曉了伐樹斬根而眾條紛糾皆相隨千秋滯義一旦通朗學者所快睹深有毗於法門云由上人而見護法由護法而見陳那如見鏡中面目也病居士王野造觀所緣緣論釋記題詞所緣緣者乃四緣中第三緣也此緣一法有二功能一能生識一作所緣所緣名境生識名緣故名所緣而又名緣也夫以三界唯心本無相質之境五明起世斯興內外之名所以陳那憫異執之沈淪審文約義而造論護法發隱微之奧旨分條析理而作釋造論者立比量為綱宗伏邪倒之疑意伸明內色揭示幽途寶思風飛雅合瀉瓶之敏邪津浪息憑施卷舌之能致使異部宗徒咸得斂躬欽服大乘閟義自茲爛彩舒光作釋者觀三支之玄府推五分之重關瞻天瞰海悲學者莫測其高深曠漢杳源憫來際靡知其涯涘由是菩薩神機昭晣詞論精研指點端倪毒智斂時增慧焰甄明利害愛河竭處沐恩波雖則至道昭明飛光昱日原以梵本西來承旨宣譯文詞巧拙出自譯師余昔觀此釋目若面墻口不能句葢為詞源精約義海淵宏雖不離於几案卒莫措其隻語也幸仗菩薩大悲願力亦乃昱等宿福所逢忽以微生親承梵響踴躍歡喜如聞授記遂探瑜伽顯揚等論深密佛地等經凡遇意相貫者記之於筆以便披覽目為觀所緣緣論釋記萬曆己酉清明前一日西蜀輔慈沙門明昱書于金陵雨花精舍分科論之綱宗科乃提挈始知脉絡相貫義勢開合而唯心之旨了然心目矣古德科經必有三分觀所緣緣論唯得存一前無敘起之由後無流通之義會於釋論則有二焉以前一頌特明造論之由故科為序分正宗分中依釋論立科總分為二一破外執以外色為所緣緣二明自宗立內色為所緣緣此科之大略耳餘細分後釋論通科分二一序分若言二正宗分分二一破外執分二一總標分二一總論分三一論能緣內識分二一牒本論略釋釋曰二論能緣差別分三一論等字所攝此中二論意識別緣若爾三論內外意許眼等二論所緣外境言外三結外執相違誠如二別推分四一推論主縱許緣其二推外執極微或許三推外執和合或復四結彼許相應此二二別破分二一牒標中二執別破分四一總推立量釋曰二別破極微分二一縱許生因何以二雙支全破若如三別破和合分四一推外轉計釋曰二明內正義若爾三縱許所緣能非四雙支全破復緣四總結二執釋曰二舉二種轉計別破分二一執極微體中具和合分二一牒彼執詞推明轉計之意釋曰二展轉引喻難破勝劣之情若如二執和合體即是極微分三一牒彼執詞推明泛然妄計釋曰二展轉引喻難破極微無別然諸三通釋前義結破異見非理上來二明自宗分二一釋內境釋曰二變差別此中
